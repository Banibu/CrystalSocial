version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: crystal_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-crystal_social}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crystal_social}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crystal_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crystal_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      POSTGRES_PRISMA_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-crystal_social}?schema=public
      POSTGRES_URL_NON_POOLING: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-crystal_social}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-your_auth_secret_must_be_at_least_32_characters}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_UPLOADTHING_APP_ID: ${NEXT_PUBLIC_UPLOADTHING_APP_ID:-}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_STREAM_KEY: ${NEXT_PUBLIC_STREAM_KEY:-}
      STREAM_SECRET: ${STREAM_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crystal_network

volumes:
  postgres_data:
    driver: local

networks:
  crystal_network:
    driver: bridge
