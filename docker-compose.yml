services:
  db:
    image: postgres:16-alpine
    container_name: crystal_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-crystal_social}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crystal_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      POSTGRES_PRISMA_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-crystal_social}?schema=public
      POSTGRES_URL_NON_POOLING: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-crystal_social}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-your_auth_secret_must_be_at_least_32_characters}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_UPLOADTHING_APP_ID: ${NEXT_PUBLIC_UPLOADTHING_APP_ID}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET}
    depends_on:
      - db

volumes:
  postgres_data:
